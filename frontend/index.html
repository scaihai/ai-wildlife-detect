<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildlifeDetect - Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Internal page-specific styles */
        .upload-center {
            display: flex;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 48px);
        }

        .upload-card-full {
            width: 100%;
            max-width: 600px;
        }

        .valid-extensions {
            font-weight: 600;
            color: var(--blue-700);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">
                    <i data-lucide="paw-print"></i>
                </div>
                <h1>WildlifeDetect</h1>
            </div>

            <nav class="sidebar-nav">
                <a class="nav-btn active" href="./">
                    <i data-lucide="layout-dashboard"></i> Inference
                </a>
                <a class="nav-btn" href="metrics-dashboard">
                    <i data-lucide="bar-chart-2"></i> Metrics
                </a>
                <a class="nav-btn monitoring-link" target="_blank" rel="noopener noreferrer">
                    <i data-lucide="activity"></i> Monitoring
                </a>
                <a class="nav-btn" href="description">
                    <i data-lucide="info"></i> Description
                </a>
                <a class="nav-btn" href="architecture">
                    <i data-lucide="network"></i> Architecture
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="powered-by" id="powered-by-text">
                    Developed By: <br />
                    Destiny Gogo-fyneface
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="upload-center">
                <div class="card p-8 upload-card-full">
                    <div style="text-align: center; margin-bottom: 24px;">
                        <h2 class="text-2xl mb-3">Wildlife Object Detection</h2>
                        <p class="text-neutral-500">Upload an image to start running inference.</p>
                    </div>

                    <!-- Drag & Drop Area -->
                    <div id="drop-zone" class="drop-zone" style="min-height: 300px; padding: 32px;">
                        <div class="upload-icon-wrapper">
                            <i data-lucide="upload" class="icon-lg text-blue-600"></i>
                        </div>
                        <h3>Upload an image</h3>
                        <p>We strictly accept <span class="valid-extensions">.jpg, .jpeg, .png</span></p>
                        
                        <p class="text-neutral-500" style="margin-bottom: 24px; font-size: 0.875rem;">
                            <strong>Supported Wildlife:</strong> Ostrich, Oryx, and Lion.
                        </p>

                        <button id="browse-btn" class="btn btn-dark mb-4">Select Image</button>
                        <input type="file" id="file-input" accept=".jpg,.jpeg,.png" class="hidden">
                    </div>

                    <!-- Selected Image Viewer (Preview before upload) -->
                    <div id="image-viewer" class="image-viewer hidden" style="min-height: 200px; margin-top: 16px;">
                        <button id="clear-image-btn" class="clear-btn" title="Clear image">
                            <i data-lucide="x"></i>
                        </button>
                        <div class="image-canvas">
                            <img id="preview-image" src="" alt="Target" style="max-height: 300px;" />
                        </div>
                    </div>

                    <!-- Error Message -->
                    <div id="error-message" class="error-msg hidden" style="margin-top: 16px;">
                        <i data-lucide="alert-circle" class="icon-sm"></i>
                        <p id="error-text"></p>
                    </div>

                    <!-- Submit -->
                    <button id="analyze-btn" class="btn btn-primary w-full disabled" disabled style="margin-top: 24px;">
                        <i data-lucide="crosshair" class="normal-icon"></i>
                        <i data-lucide="loader-2" class="spin-icon hidden"></i>
                        <span id="analyze-btn-text">Run Inference</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="index.js"></script>
</body>

</html>
